<div class="mx-auto max-w-md rounded-xl border border-slate-200 bg-white p-8 shadow-sm">
  <h1 class="text-xl font-semibold text-slate-900">Вход — платформа</h1>
  <p class="mt-1 text-sm text-slate-500">
    Учётная запись с ролью super_admin
  </p>
  <form
    class="mt-6 space-y-4"
    [formGroup]="form"
    (ngSubmit)="submit()"
  >
    <div>
      <label
        class="mb-1 block text-sm font-medium text-slate-700"
        for="email"
      >Email</label>
      <input
        id="email"
        type="email"
        formControlName="email"
        autocomplete="username"
        class="w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 outline-none ring-slate-200 focus:ring"
      >
    </div>
    <div>
      <label
        class="mb-1 block text-sm font-medium text-slate-700"
        for="password"
      >Пароль</label>
      <input
        id="password"
        type="password"
        formControlName="password"
        autocomplete="current-password"
        class="w-full rounded-md border border-slate-300 px-3 py-2 text-slate-900 outline-none ring-slate-200 focus:ring"
      >
    </div>
    <button
      type="submit"
      class="w-full rounded-md bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-black disabled:opacity-60"
      [disabled]="submitting || form.invalid"
    >
      {{ submitting ? 'Вход…' : 'Войти' }}
    </button>
  </form>
</div>
