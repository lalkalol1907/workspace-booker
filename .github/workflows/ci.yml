name: CI

# Только ветки и PR — без Docker build.
on:
  workflow_dispatch:
  push:
    branches:
      - '**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint-test:
    uses: ./.github/workflows/ci-reusable.yml
