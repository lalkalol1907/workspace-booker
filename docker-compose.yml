services:
  api:
    image: lalkalol1907/workspace-booker-api:${IMAGE_TAG:-latest}
    networks:
      - booker-network
    env_file:
      - .env
    expose:
      - "3000"
    restart: unless-stopped

  web:
    image: lalkalol1907/workspace-booker-web:${IMAGE_TAG:-latest}
    volumes:
      - /etc/nginx/ssl:/etc/nginx/ssl
    networks:
      - booker-network
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-api:3000}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - api
    restart: unless-stopped

networks:
  booker-network:
    external: false