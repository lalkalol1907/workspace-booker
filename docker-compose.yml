services:
  api:
    image: lalkalol1907/workspace-booker-api:${IMAGE_TAG:-latest}
    networks:
      - booker-network
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      - postgres
      - redis
    restart: unless-stopped

  web:
    image: lalkalol1907/workspace-booker-web:${IMAGE_TAG:-latest}
    volumes:
      - /etc/nginx/ssl:/etc/nginx/ssl
    networks:
      - booker-network
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-api:3000}
      PLATFORM_HOST: ${PLATFORM_HOST:-platform.localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      - api
    restart: unless-stopped

  worker:
    image: lalkalol1907/workspace-booker-worker:${IMAGE_TAG:-latest}
    networks:
      - booker-network
    env_file:
      - .env
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  postgres:
    image: bitnamilegacy/postgresql
    networks:
      - booker-network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - .env
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    networks:
      - booker-network
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

networks:
  booker-network:
    external: false