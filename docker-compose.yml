services:
  api:
    image: lalkalol1907/workspace-booker-api:${IMAGE_TAG:-latest}
    networks:
      - booker-network
    env_file:
      - .env
    expose:
      - "3000"
    depends_on:
      postgres:
        condition: service_started
      redis:
        condition: service_started
      mongo:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 45s
    # Реплики по умолчанию (поле `scale` в Compose Specification)
    deploy:
      replicas: 3
    restart: unless-stopped

  web:
    image: lalkalol1907/workspace-booker-web:${IMAGE_TAG:-latest}
    env_file:
      - .env
    volumes:
      - /etc/nginx/ssl:/etc/nginx/ssl
    networks:
      - booker-network
    environment:
      API_UPSTREAM: ${API_UPSTREAM:-api:3000}
      PLATFORM_HOST: ${PLATFORM_HOST:-platform.localhost}
      LANDING_HOST: ${LANDING_HOST:-landing.localhost}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  worker:
    image: lalkalol1907/workspace-booker-worker:${IMAGE_TAG:-latest}
    networks:
      - booker-network
    env_file:
      - .env
    depends_on:
      - api
      - redis
      - postgres
    restart: unless-stopped

  postgres:
    image: bitnamilegacy/postgresql
    networks:
      - booker-network
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - .env
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  mongo:
    image: mongo:7
    networks:
      - booker-network
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - ./mongodata:/data/db
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --save 60 1000
    volumes:
      - ./redisdata:/data
    networks:
      - booker-network
    ports:
      - "${REDIS_PORT:-6379}:6379"
    restart: unless-stopped

networks:
  booker-network:
    external: false